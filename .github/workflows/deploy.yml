name: Build and Deploy (GHCR & Self-Hosted Pull)

on:
  push:
    branches: [ "master", "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Recreate Build-time Env File
        run: |
          # Create empty placeholder env files for Docker Compose validation at build-time
          touch .env
          mkdir -p ./dropforge-backend
          touch ./dropforge-backend/.env
          mkdir -p ./dropforge-web
          touch ./dropforge-web/.env

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Tag Images
        run: |
          # Build all services locally on the GitHub-hosted runner using production compose
          # We use docker-compose.prod.yml to set the ghcr.io image tags, but we must build using docker-compose.yml context
          docker compose -f docker-compose.yml build
          
          # Tag the built images with the GHCR repository
          docker tag dropforge-api:latest ghcr.io/${{ github.repository }}/dropforge-api:latest
          docker tag dropforge-web:latest ghcr.io/${{ github.repository }}/dropforge-web:latest

      - name: Push Images to GHCR
        run: |
          # Push the pre-built backend and frontend images to GHCR
          docker push ghcr.io/${{ github.repository }}/dropforge-api:latest
          docker push ghcr.io/${{ github.repository }}/dropforge-web:latest

  deploy:
    name: Deploy to VPS (Self-Hosted Pull)
    runs-on: self-hosted
    needs: build-and-push

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Recreate Production Environment Files
        run: |
          # Securely recreate all `.env` files from secrets using the redirect pattern
          echo "${{ secrets.ROOT_ENV }}" > .env
          mkdir -p ./dropforge-backend
          mkdir -p ./dropforge-web
          echo "${{ secrets.BACKEND_ENV }}" > ./dropforge-backend/.env
          echo "${{ secrets.FRONTEND_ENV }}" > ./dropforge-web/.env

      - name: Log in to GitHub Container Registry on VPS (Sudo)
        run: |
          # Since Docker requires sudo, we must log in as the root user so 'sudo docker pull' works!
          echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S sh -c 'echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin'

      - name: Pull Pre-built Images from GHCR
        run: |
          # Pull pre-compiled images from GHCR instantly (no build spikes on VPS!)
          echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S docker compose -f docker-compose.prod.yml pull

      - name: Reload Caddy Service on Host (Direct Path)
        run: |
          # Ensure host Caddy service is running
          if ! systemctl is-active --quiet caddy; then
            echo "Starting host-level Caddy service..."
            echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S systemctl start caddy
          fi
          
          echo "Reloading Caddy with configuration file: $(pwd)/Caddyfile"
          echo "${{ secrets.SUDO_PASSWORD }}" | sudo -E -S caddy reload --config ./Caddyfile

      - name: Run Docker Containers
        run: |
          # Start containers using the pulled images
          echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S docker compose -f docker-compose.prod.yml up -d

      - name: Cleanup Dangling Docker Images
        run: |
          # Cleanup old unused docker image tags to save VPS disk space
          echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S docker image prune -f
